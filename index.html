<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jack's Tester</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #080808; --surface: #101010; --surface-2: #181818; --surface-3: #222222;
      --border: #2a2a2a; --border-light: #363636;
      --text: #e8e8e8; --text-dim: #888888; --text-muted: #5a5a5a;
      --accent: #ef4444; --accent-soft: #ef444420; --accent-glow: #ef444450;
      --green: #34d399; --green-soft: #34d39920;
      --red: #f87171; --red-soft: #f8717120;
      --yellow: #fbbf24; --yellow-soft: #fbbf2420;
      --blue: #60a5fa; --cyan: #22d3ee;
      --radius: 14px; --radius-sm: 10px;
    }
    body { font-family:'Inter',-apple-system,BlinkMacSystemFont,system-ui,sans-serif; background:var(--bg); color:var(--text); height:100vh; line-height:1.6; overflow:hidden; display:flex; flex-direction:column; }

    .topbar { border-bottom:1px solid var(--border); background:var(--surface); padding:0.8rem 2rem; display:flex; align-items:center; justify-content:space-between; position:sticky; top:0; z-index:100; }
    .topbar-left { display:flex; align-items:center; gap:0.8rem; }
    .logo { font-family:'Poppins',sans-serif; font-size:1.4rem; font-weight:900; letter-spacing:0.05em; text-transform:uppercase; color:#ef4444; -webkit-text-fill-color:#ef4444; background:none; -webkit-background-clip:unset; }
    .logo-div { width:1px; height:18px; background:var(--border); }
    .logo-sub { font-size:0.78rem; color:var(--text-dim); font-weight:500; }

    .main { max-width:1400px; margin:0 auto; padding:1.5rem 2rem 3rem; overflow-y:auto; flex:1; }
    .section { margin-bottom:1.5rem; }
    .section-title { font-size:0.68rem; text-transform:uppercase; letter-spacing:0.1em; color:var(--text-muted); margin-bottom:0.6rem; font-weight:600; }

    /* Business list with checkboxes */
    .biz-list { display:flex; gap:0.6rem; flex-wrap:wrap; align-items:center; }
    .biz-chip {
      display:flex; align-items:center; gap:0.6rem;
      padding:0.5rem 0.9rem; background:var(--surface); border:1px solid var(--border);
      border-radius:var(--radius-sm); font-size:0.8rem; font-weight:600;
      cursor:pointer; transition:all 0.15s; user-select:none;
    }
    .biz-chip:hover { border-color:var(--border-light); }
    .biz-chip.checked { border-color:#1e3a5f; background:#1a274420; }
    .biz-chip input[type="checkbox"] {
      appearance:none; -webkit-appearance:none; width:16px; height:16px;
      border:2px solid var(--border-light); border-radius:4px; cursor:pointer;
      position:relative; flex-shrink:0; transition:all 0.15s;
    }
    .biz-chip input[type="checkbox"]:checked {
      background:#1a2744; border-color:#1a2744;
    }
    .biz-chip input[type="checkbox"]:checked::after {
      content:'\2713'; position:absolute; top:-1px; left:2px;
      font-size:11px; color:#fff; font-weight:700;
    }
    .biz-chip .biz-remove {
      width:18px; height:18px; display:flex; align-items:center; justify-content:center;
      border-radius:50%; font-size:0.7rem; color:var(--text-muted);
      cursor:pointer; transition:all 0.15s; margin-left:0.2rem;
    }
    .biz-chip .biz-remove:hover { background:var(--red-soft); color:var(--red); }
    .biz-add {
      display:flex; align-items:center; gap:0.4rem;
      padding:0.5rem 0.9rem; background:var(--surface-2);
      border:1px dashed var(--border-light); border-radius:var(--radius-sm);
      font-size:0.78rem; font-weight:600; color:var(--text-dim); cursor:pointer;
      transition:all 0.15s;
    }
    .biz-add:hover { border-color:var(--accent); color:var(--accent); }

    /* Modal */
    .modal-overlay {
      position:fixed; inset:0; background:#00000080; z-index:200;
      display:flex; align-items:center; justify-content:center;
      opacity:0; pointer-events:none; transition:opacity 0.2s;
    }
    .modal-overlay.open { opacity:1; pointer-events:auto; }
    .modal { background:var(--surface); border:1px solid var(--border); border-radius:var(--radius); width:480px; max-width:95vw; padding:1.5rem; }
    .modal h2 { font-size:1rem; margin-bottom:1rem; }
    .modal label { display:block; margin-bottom:0.8rem; }
    .modal .lbl { font-size:0.7rem; text-transform:uppercase; letter-spacing:0.08em; color:var(--text-dim); margin-bottom:0.3rem; display:block; }
    .modal input {
      width:100%; padding:0.55rem 0.8rem; background:var(--surface-2);
      border:1px solid var(--border); border-radius:8px; color:var(--text);
      font-size:0.85rem; font-family:inherit; outline:none; transition:border-color 0.15s;
    }
    .modal input:focus { border-color:var(--accent); }
    .modal input::placeholder { color:var(--text-muted); }
    .modal select {
      width:100%; padding:0.55rem 0.8rem; background:var(--surface-2);
      border:1px solid var(--border); border-radius:8px; color:var(--text);
      font-size:0.85rem; font-family:inherit; outline:none; transition:border-color 0.15s;
      cursor:pointer;
    }
    .modal select:focus { border-color:var(--accent); }
    .modal select option { background:var(--surface-2); color:var(--text); }
    .biz-type-badge {
      font-size:0.55rem; font-weight:700; text-transform:uppercase; letter-spacing:0.04em;
      padding:0.1rem 0.35rem; border-radius:4px; margin-left:0.3rem;
    }
    .biz-type-wc { background:#ef444420; color:#f87171; }
    .biz-type-hc { background:#06b6d420; color:#22d3ee; }
    .modal-btns { display:flex; gap:0.6rem; margin-top:1.25rem; justify-content:flex-end; }

    /* Buttons */
    .btn {
      display:inline-flex; align-items:center; gap:0.45rem;
      padding:0.55rem 1rem; border:1px solid var(--border); border-radius:var(--radius-sm);
      font-size:0.8rem; font-weight:600; cursor:pointer; transition:all 0.15s;
      font-family:inherit; background:var(--surface-2); color:var(--text);
    }
    .btn:hover { border-color:var(--border-light); background:var(--surface-3); }
    .btn:disabled { opacity:0.35; cursor:not-allowed; }
    .btn-accent { background:var(--accent); border-color:var(--accent); color:#fff; box-shadow:0 0 24px var(--accent-glow); }
    .btn-accent:hover { filter:brightness(1.1); background:var(--accent); }
    .btn-ghost { background:transparent; border-color:transparent; color:var(--text-dim); }
    .btn-ghost:hover { color:var(--text); }
    .btn-run-all {
      padding:0.75rem 2rem; font-size:0.95rem;
      background:linear-gradient(135deg,#1a2744,#0f1a2e);
      border:none; color:#fff;
      box-shadow:0 4px 15px #0003;
      border-radius:var(--radius-sm); cursor:pointer; font-family:inherit; font-weight:700;
      transition:all 0.15s;
    }
    .btn-run-all:hover { filter:brightness(1.12); }
    .btn-run-all:disabled { opacity:0.35; cursor:not-allowed; filter:none; }

    .btn-stop {
      padding:0.75rem 2rem; font-size:0.95rem;
      background:var(--red); border:none; color:#fff;
      box-shadow:0 0 30px var(--red-soft),0 4px 15px #0003;
      border-radius:var(--radius-sm); cursor:pointer; font-family:inherit; font-weight:700;
      transition:all 0.15s; display:none;
    }
    .btn-stop:hover { filter:brightness(1.12); }

    .run-section { text-align:center; padding:1.5rem; margin-bottom:1.5rem; }
    .global-status { text-align:center; margin-bottom:0.75rem; font-size:0.8rem; color:var(--text-dim); min-height:1.4em; }
    .checked-count { font-size:0.75rem; color:var(--text-muted); margin-top:0.5rem; }

    /* Test columns */
    .test-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:1rem; margin-bottom:1.5rem; }
    @media(max-width:1100px){.test-grid{grid-template-columns:1fr 1fr;}}
    @media(max-width:640px){.test-grid{grid-template-columns:1fr;}}

    .test-panel {
      background:var(--surface); border:1px solid var(--border);
      border-radius:var(--radius); display:flex; flex-direction:column; overflow:hidden;
    }
    .tpanel-header {
      padding:0.8rem 1rem; border-bottom:1px solid var(--border);
      display:flex; align-items:center; justify-content:space-between; flex-shrink:0;
    }
    .tpanel-header .left { display:flex; align-items:center; gap:0.5rem; }
    .tpanel-header .icon-box { width:28px; height:28px; border-radius:7px; display:flex; align-items:center; justify-content:center; font-size:0.9rem; }
    .tpanel-header h3 { font-size:0.82rem; font-weight:700; }
    .icon-voice{background:#ef444420;} .icon-sms{background:#06b6d420;} .icon-web{background:#fb923c20;} .icon-email{background:#ec489920;}

    .badge { padding:0.15rem 0.5rem; border-radius:999px; font-size:0.6rem; font-weight:700; text-transform:uppercase; letter-spacing:0.04em; }
    .badge-idle{background:var(--surface-3);color:var(--text-muted);} .badge-running{background:var(--accent-soft);color:var(--accent);animation:pulse 2s infinite;} .badge-pass{background:var(--green-soft);color:var(--green);} .badge-fail{background:var(--red-soft);color:var(--red);}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

    .tpanel-metrics { display:grid; grid-template-columns:1fr 1fr; gap:1px; background:var(--border); border-bottom:1px solid var(--border); flex-shrink:0; }
    .tpanel-metric { background:var(--surface); padding:0.45rem 0.6rem; text-align:center; }
    .tpanel-metric .val { font-size:0.95rem; font-weight:700; font-family:'JetBrains Mono',monospace; }
    .tpanel-metric .lbl { font-size:0.55rem; text-transform:uppercase; letter-spacing:0.08em; color:var(--text-muted); }

    .transcript { flex:1; overflow-y:auto; padding:0.75rem; min-height:220px; max-height:420px; }
    .transcript::-webkit-scrollbar{width:4px;} .transcript::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
    .transcript-empty { display:flex; align-items:center; justify-content:center; height:180px; color:var(--text-muted); font-size:0.75rem; text-align:center; }

    .audio-row { padding:0.5rem 0.75rem; border-top:1px solid var(--border); flex-shrink:0; }
    .audio-row audio { width:100%; height:32px; }

    .brow { display:flex; margin-bottom:0.45rem; gap:0.35rem; align-items:flex-start; }
    .brow.out { flex-direction:row-reverse; }
    .bavatar { width:22px; height:22px; border-radius:6px; display:flex; align-items:center; justify-content:center; font-size:0.55rem; font-weight:700; flex-shrink:0; margin-top:1px; }
    .av-bot{background:var(--accent-soft);color:var(--accent);border:1px solid #ef444425;} .av-cust{background:var(--green-soft);color:var(--green);border:1px solid #34d39925;}
    .bbubble { max-width:85%; padding:0.4rem 0.7rem; border-radius:10px; font-size:0.78rem; line-height:1.5; }
    .brow:not(.out) .bbubble{background:var(--surface-2);border:1px solid var(--border);border-bottom-left-radius:3px;}
    .brow.out .bbubble{background:var(--accent-soft);border:1px solid #ef444420;border-bottom-right-radius:3px;}
    .bbubble .btime { font-size:0.55rem; color:var(--text-muted); margin-top:0.2rem; }

    .phase-div { display:flex; align-items:center; gap:0.5rem; margin:0.6rem 0; }
    .phase-div .pline{flex:1;height:1px;background:var(--border);}
    .phase-div .plabel{font-size:0.58rem;font-weight:600;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);padding:0.15rem 0.5rem;background:var(--surface-2);border-radius:999px;border:1px solid var(--border);white-space:nowrap;}

    .sys{text-align:center;font-size:0.68rem;color:var(--text-muted);margin:0.35rem 0;}
    .sys-ok{color:var(--green);font-weight:600;} .sys-err{color:var(--red);font-weight:600;} .sys-warn{color:var(--yellow);}

    .checks{padding:0.6rem 0.75rem;border-top:1px solid var(--border);flex-shrink:0;}
    .checks h4{font-size:0.6rem;text-transform:uppercase;letter-spacing:0.08em;color:var(--text-muted);margin-bottom:0.35rem;}
    .chk{display:flex;align-items:center;gap:0.4rem;font-size:0.68rem;padding:0.1rem 0;color:var(--text-dim);}
    .chk.cp{color:var(--green);} .chk.cf{color:var(--red);}
    .chk .ci{width:12px;text-align:center;flex-shrink:0;}

    .spinner-sm{display:inline-block;width:12px;height:12px;border:2px solid var(--accent);border-top-color:transparent;border-radius:50%;animation:spin 0.7s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg);}}

    /* Currently testing label */
    .testing-label {
      background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-sm);
      padding:0.6rem 1rem; margin-bottom:1rem; display:none;
      font-size:0.82rem; font-weight:600;
    }
    .testing-label .biz-name { color:var(--accent); }
    .testing-label .progress { color:var(--text-dim); font-weight:400; float:right; }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <svg class="logo-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 22 22" width="24" height="24" fill="none" stroke="#2a4a7f" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14.7 6.3a1 1 0 0 0 0 1.4l1.6 1.6a1 1 0 0 0 1.4 0l3.77-3.77a6 6 0 0 1-7.94 7.94L6.73 20.2a2.12 2.12 0 0 1-3-3l6.73-6.73a6 6 0 0 1 7.94-7.94z" transform="scale(0.88) translate(1,1)"/></svg>
    <div class="logo">Jack's Tester</div>
  </div>
</div>

<div class="main">
  <div class="section">
    <div class="section-title">Businesses</div>
    <div class="biz-list" id="bizList"></div>
  </div>

  <div class="run-section">
    <div class="global-status" id="globalStatus"></div>
    <button class="btn btn-run-all" id="runAllBtn" onclick="runAllTests()" disabled>Run All Tests</button>
    <button class="btn-stop" id="stopBtn" onclick="stopAllTests()">Stop Tests</button>
    <div class="checked-count" id="checkedCount"></div>
  </div>

  <div class="testing-label" id="testingLabel">
    Testing: <span class="biz-name" id="testingBizName"></span>
    <span class="progress" id="testingProgress"></span>
  </div>

  <div class="test-grid" id="testGrid" style="display:none;">
    <div class="test-panel" id="panelVoice">
      <div class="tpanel-header">
        <div class="left"><div class="icon-box icon-voice">&#9742;</div><h3>Voice Call</h3></div>
        <span class="badge badge-idle" id="badgeVoice">IDLE</span>
      </div>
      <div class="tpanel-metrics">
        <div class="tpanel-metric"><div class="val" id="mVoiceDur">--</div><div class="lbl">Duration</div></div>
        <div class="tpanel-metric"><div class="val" id="mVoiceDb">--</div><div class="lbl">DB Records</div></div>
      </div>
      <div class="transcript" id="tVoice"><div class="transcript-empty">Waiting to run...</div></div>
      <div class="audio-row" id="audioRow" style="display:none;"><audio controls id="audioPlayer"></audio></div>
      <div class="checks" id="chkVoice" style="display:none;"></div>
    </div>
    <div class="test-panel" id="panelSms">
      <div class="tpanel-header">
        <div class="left"><div class="icon-box icon-sms">&#128172;</div><h3>SMS</h3></div>
        <span class="badge badge-idle" id="badgeSms">IDLE</span>
      </div>
      <div id="smsRoute" style="padding:0.3rem 0.9rem;font-size:0.7rem;color:var(--text-dim);font-family:'JetBrains Mono',monospace;display:none;"></div>
      <div class="tpanel-metrics">
        <div class="tpanel-metric"><div class="val" id="mSmsMsgs">--</div><div class="lbl">Messages</div></div>
        <div class="tpanel-metric"><div class="val" id="mSmsDb">--</div><div class="lbl">DB Records</div></div>
      </div>
      <div class="transcript" id="tSms"><div class="transcript-empty">Waiting to run...</div></div>
      <div class="checks" id="chkSms" style="display:none;"></div>
    </div>
    <div class="test-panel" id="panelWeb">
      <div class="tpanel-header">
        <div class="left"><div class="icon-box icon-web">&#127760;</div><h3>Website Form</h3></div>
        <span class="badge badge-idle" id="badgeWeb">IDLE</span>
      </div>
      <div class="tpanel-metrics">
        <div class="tpanel-metric"><div class="val" id="mWebStatus">--</div><div class="lbl">HTTP Status</div></div>
        <div class="tpanel-metric"><div class="val" id="mWebDb">--</div><div class="lbl">DB Records</div></div>
      </div>
      <div class="transcript" id="tWeb"><div class="transcript-empty">Waiting to run...</div></div>
      <div class="checks" id="chkWeb" style="display:none;"></div>
    </div>
    <div class="test-panel" id="panelEmail">
      <div class="tpanel-header">
        <div class="left"><div class="icon-box icon-email">&#9993;</div><h3>Email</h3></div>
        <span class="badge badge-idle" id="badgeEmail">IDLE</span>
      </div>
      <div class="tpanel-metrics">
        <div class="tpanel-metric"><div class="val" id="mEmailStatus">--</div><div class="lbl">Status</div></div>
        <div class="tpanel-metric"><div class="val" id="mEmailDb">--</div><div class="lbl">DB Records</div></div>
      </div>
      <div class="transcript" id="tEmail"><div class="transcript-empty">Waiting to run...</div></div>
      <div class="checks" id="chkEmail" style="display:none;"></div>
    </div>
  </div>
</div>

<!-- Add Business Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <h2 id="modalTitle">Add Business</h2>
    <label><span class="lbl">Business Name *</span><input type="text" id="inBizName" placeholder="e.g. WinBros Window Cleaning"></label>
    <label><span class="lbl">Business Type *</span><select id="inBizType"><option value="window_cleaning">Window Cleaning (WinBros-style)</option><option value="house_cleaning">Cleaning Company (Spotless-style)</option></select></label>
    <label><span class="lbl">VAPI Phone Number (for voice calls)</span><input type="text" id="inVapi" placeholder="+15103705908"></label>
    <label><span class="lbl">SMS Phone Number (for text messaging)</span><input type="text" id="inSms" placeholder="+17479663565"></label>
    <label><span class="lbl">Website URL (for form submissions)</span><input type="text" id="inWeb" placeholder="https://example.com/contact"></label>
    <label><span class="lbl">Email Address (for email testing)</span><input type="text" id="inEmail" placeholder="info@example.com"></label>
    <div class="modal-btns">
      <button class="btn btn-ghost" onclick="closeModal()">Cancel</button>
      <button class="btn btn-accent" id="modalSaveBtn" onclick="saveBiz()">Add Business</button>
    </div>
  </div>
</div>

<script>
  // ── Config ──
  const VAPI_KEY = 'ea797598-b8b9-4fde-a75d-7c40be82ab9a';
  const VAPI_BASE = 'https://api.vapi.ai';
  const OPENPHONE_KEY = 'hn1A3qbg6ogfUBNmoCbF3OxO6WTlInP2';
  const OPENPHONE_BASE = 'https://api.openphone.com/v1';
  const SUPABASE_URL = 'https://kcmbwstjmdrjkhxhkkjt.supabase.co';
  const SUPABASE_REST = SUPABASE_URL + '/rest/v1';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImtjbWJ3c3RqbWRyamtoeGhra2p0Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc2OTU3NTQwNiwiZXhwIjoyMDg1MTUxNDA2fQ.PacsDAnXZHXutdNVe8ClCJGDeDVQ2viu9b_aJLPmE24';
  const STORAGE_URL = SUPABASE_URL + '/storage/v1/object';
  const BIZ_FILE = 'osiris-config/businesses.json';
  const FROM_VAPI_ID = '3bad8017-09da-4412-81f9-8439b1633337';
  const FROM_VAPI_NUMBER = '+17169521258';
  const FROM_VAPI_NUMBER_ENC = '%2B17169521258';
  const FROM_OPENPHONE_ID = 'PNuat0xvca';
  const TEST_PHONE = '+14246771112';
  const TEST_PHONE_ENC = '%2B14246771112';
  const NOTIFY_PHONE = '+14157204580';

  // Cache of OpenPhone number -> phoneNumberId
  let opPhoneIdCache = {};

  // Strip formatting from phone numbers: "+1(424) 677-1146" -> "+14246771146"
  function normalizePhone(p) { return p ? p.replace(/[\s()\-\.]/g, '') : p; }

  async function resolveOpenPhoneId(phoneNumber) {
    const norm = normalizePhone(phoneNumber);
    if (opPhoneIdCache[norm]) return opPhoneIdCache[norm];
    try {
      const r = await fetch(`${OPENPHONE_BASE}/phone-numbers`, { headers: { 'Authorization': OPENPHONE_KEY } });
      const data = await r.json();
      (data.data || []).forEach(p => { opPhoneIdCache[normalizePhone(p.number)] = p.id; });
    } catch (e) {}
    return opPhoneIdCache[norm] || null;
  }

  let businesses = [];
  let running = false;
  let stopRequested = false;
  const supaHeaders = { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` };

  // ── Helpers ──
  function sleep(ms) {
    return new Promise((resolve, reject) => {
      const id = setTimeout(resolve, ms);
      // Check stop flag periodically during long sleeps
      const check = setInterval(() => { if (stopRequested) { clearTimeout(id); clearInterval(check); reject(new Error('__STOPPED__')); } }, 500);
      setTimeout(() => clearInterval(check), ms + 100);
    });
  }

  function stopAllTests() {
    stopRequested = true;
    setStatus('Stopping tests...');
  }
  const ts = () => new Date().toLocaleTimeString('en-US', { hour12: false });

  async function supaFetch(table, query) {
    const r = await fetch(`${SUPABASE_REST}/${table}?${query}`, { headers: supaHeaders });
    return r.json();
  }
  async function supaDelete(table, query) {
    await fetch(`${SUPABASE_REST}/${table}?${query}`, { method: 'DELETE', headers: supaHeaders });
  }
  async function supaPatch(table, query, body) {
    await fetch(`${SUPABASE_REST}/${table}?${query}`, {
      method: 'PATCH', headers: { ...supaHeaders, 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
  }

  function setBadge(id, s, label) { const e = document.getElementById(id); e.className = 'badge badge-' + s; e.textContent = label; }
  function setStatus(msg) { document.getElementById('globalStatus').textContent = msg; }

  function addBubble(cid, text, out, time) {
    const a = document.getElementById(cid);
    if (a.querySelector('.transcript-empty')) a.innerHTML = '';
    const row = document.createElement('div'); row.className = 'brow' + (out ? ' out' : '');
    const av = document.createElement('div'); av.className = 'bavatar ' + (out ? 'av-cust' : 'av-bot'); av.textContent = out ? 'AT' : 'BZ';
    const bb = document.createElement('div'); bb.className = 'bbubble'; bb.textContent = text;
    if (time) { const t = document.createElement('div'); t.className = 'btime'; t.textContent = time; bb.appendChild(t); }
    row.append(av, bb); a.appendChild(row); a.scrollTop = a.scrollHeight;
  }

  function addSys(id, text, cls) {
    const a = document.getElementById(id);
    if (a.querySelector('.transcript-empty')) a.innerHTML = '';
    const d = document.createElement('div'); d.className = 'sys ' + (cls || ''); d.textContent = text;
    a.appendChild(d); a.scrollTop = a.scrollHeight;
  }

  function addPhase(id, label) {
    const a = document.getElementById(id);
    if (a.querySelector('.transcript-empty')) a.innerHTML = '';
    const d = document.createElement('div'); d.className = 'phase-div';
    d.innerHTML = `<div class="pline"></div><div class="plabel">${label}</div><div class="pline"></div>`;
    a.appendChild(d);
  }

  function showChecks(id, items) {
    const el = document.getElementById(id); el.style.display = 'block';
    let h = '<h4>Evaluation</h4>';
    items.forEach(i => {
      const c = i.s === true ? 'cp' : i.s === false ? 'cf' : '';
      const ic = i.s === true ? '\u2713' : i.s === false ? '\u2717' : '\u2014';
      h += `<div class="chk ${c}"><span class="ci">${ic}</span>${i.t}</div>`;
    });
    el.innerHTML = h;
  }

  // ── Business Persistence (Supabase Storage) ──
  async function loadBusinesses() {
    try {
      const r = await fetch(`${STORAGE_URL}/authenticated/${BIZ_FILE}?t=${Date.now()}`, { headers: supaHeaders });
      if (r.ok) businesses = await r.json();

  async function saveBusinesses() {
    await fetch(`${STORAGE_URL}/${BIZ_FILE}`, {
      method: 'POST',

  // ── Business UI ──
  function getCheckedBiz() { return businesses.filter(b => b.checked); }

  function renderBizList() {
    const list = document.getElementById('bizList');
    list.innerHTML = '';
    businesses.forEach((b, i) => {
      const chip = document.createElement('div');
      chip.className = 'biz-chip' + (b.checked ? ' checked' : '');
      const bt = b.type || 'window_cleaning';
      const btLabel = bt === 'house_cleaning' ? 'HC' : 'WC';
      const btCls = bt === 'house_cleaning' ? 'biz-type-hc' : 'biz-type-wc';
      chip.innerHTML = `
        <input type="checkbox" ${b.checked ? 'checked' : ''} onclick="event.stopPropagation(); toggleBiz(${i})">
        <span onclick="event.stopPropagation(); editBiz(${i})" style="cursor:pointer">${b.name}<span class="biz-type-badge ${btCls}">${btLabel}</span></span>
        <span class="biz-remove" onclick="event.stopPropagation();removeBiz(${i})">\u00D7</span>
      `;
      list.appendChild(chip);
    });
    const add = document.createElement('div');
    add.className = 'biz-add'; add.textContent = '+ Add Business'; add.onclick = openModal;
    list.appendChild(add);

    const checked = getCheckedBiz();
    document.getElementById('runAllBtn').disabled = checked.length === 0 || running;
    document.getElementById('checkedCount').textContent = checked.length > 0
      ? `${checked.length} business${checked.length > 1 ? 'es' : ''} selected`
      : 'Check at least one business to run tests';
  }

  function toggleBiz(i) {
    businesses[i].checked = !businesses[i].checked;
    saveBusinesses();
    renderBizList();
  }

  function removeBiz(i) {
    if (!confirm(`Remove "${businesses[i].name}"?`)) return;
    businesses.splice(i, 1);
    saveBusinesses();
    renderBizList();
  }

  let editingBizIdx = -1;

  function openModal() {
    editingBizIdx = -1;
    document.getElementById('modalTitle').textContent = 'Add Business';
    document.getElementById('modalSaveBtn').textContent = 'Add Business';
    document.getElementById('modalOverlay').classList.add('open');
    document.getElementById('inBizName').focus();
  }

  function editBiz(i) {
    editingBizIdx = i;
    const b = businesses[i];
    document.getElementById('inBizName').value = b.name || '';
    document.getElementById('inBizType').value = b.type || 'window_cleaning';
    document.getElementById('inVapi').value = b.vapi || '';
    document.getElementById('inSms').value = b.sms || '';
    document.getElementById('inWeb').value = b.web || '';
    document.getElementById('inEmail').value = b.email || '';
    document.getElementById('modalTitle').textContent = 'Edit Business';
    document.getElementById('modalSaveBtn').textContent = 'Save Changes';
    document.getElementById('modalOverlay').classList.add('open');
    document.getElementById('inBizName').focus();
  }

  function closeModal() {
    editingBizIdx = -1;
    document.getElementById('modalOverlay').classList.remove('open');
    ['inBizName','inVapi','inSms','inWeb','inEmail'].forEach(id => document.getElementById(id).value = '');
    document.getElementById('inBizType').selectedIndex = 0;
  }

  function saveBiz() {
    const name = document.getElementById('inBizName').value.trim();
    if (!name) return;
    const data = {
      name,
      type: document.getElementById('inBizType').value,
      vapi: document.getElementById('inVapi').value.trim(),
      sms: document.getElementById('inSms').value.trim(),
      web: document.getElementById('inWeb').value.trim(),
      email: document.getElementById('inEmail').value.trim(),
    };
    if (editingBizIdx >= 0) {
      data.checked = businesses[editingBizIdx].checked;
      businesses[editingBizIdx] = data;
    } else {
      data.checked = true;
      businesses.push(data);
    }
    saveBusinesses();
    closeModal();
    renderBizList();
  }

    ['chkVoice','chkSms','chkWeb','chkEmail'].forEach(id => { document.getElementById(id).style.display = 'none'; });

    document.getElementById('audioRow').style.display = 'none';
  }

  // ── Voice Test ──
  async function testVoice(biz) {
    if (!biz.vapi) { setBadge('badgeVoice','fail','SKIPPED'); addSys('tVoice','No VAPI number configured.','sys-warn'); return 'SKIPPED'; }
    const vapiNumber = normalizePhone(biz.vapi);
    const bizType = biz.type || 'window_cleaning';
    setBadge('badgeVoice','running','CALLING');
    addPhase('tVoice','Voice Call');
    addSys('tVoice','Dialing ' + vapiNumber + '...');

    const voicePrompts = {
      window_cleaning: {
        system: "You are Alex Thompson, a homeowner calling to get a quote on window cleaning. You want EXTERIOR ONLY windows cleaned. About 2500 square feet. No French panes. Address: 742 Evergreen Terrace, Naperville, IL 60540. Preferred time: Saturday at 10am. Found via Google search. Your phone number is 424-677-1112 and you can receive texts there. Be natural, keep answers short. Accept whatever time they offer closest to Saturday morning.\n\nIMPORTANT RULES:\n- If they ask for your phone number or where to text you, say \"4 2 4, 6 7 7, 1 1 1 2\"\n- If they say they will text you, say \"Yeah you can text me at 4 2 4, 6 7 7, 1 1 1 2\"\n- If they ask for the best number to reach you, say \"4 2 4, 6 7 7, 1 1 1 2\"\n- When they confirm and say goodbye, say 'Sounds great, thanks!' and nothing else",
        firstMessage: "Hi! I'm calling about getting my windows cleaned - do you guys do free estimates?"
      },
      house_cleaning: {
        system: "You are Alex Thompson, a homeowner calling about house cleaning services. You want a STANDARD CLEANING. Your home is 3 bedrooms, 2 bathrooms. Address: 742 Evergreen Terrace, Naperville, IL 60540. You do NOT need a deep clean or move-in/move-out clean. Your phone number is 424-677-1112 and you can receive texts there.\n\nIMPORTANT RULES:\n- When the bot asks about bedrooms and bathrooms, say \"3 bedrooms and 2 bathrooms\"\n- If asked about service type, say \"just a standard cleaning\"\n- If asked your name, say \"Alex Thompson\"\n- If asked about frequency, say \"just a one-time cleaning for now\"\n- If they ask for your phone number or where to text you, say \"4 2 4, 6 7 7, 1 1 1 2\"\n- If they say they will text you a quote or pricing, say \"Sounds good, you can text me at 4 2 4, 6 7 7, 1 1 1 2\"\n- If they ask for the best number to reach you, say \"4 2 4, 6 7 7, 1 1 1 2\"\n- Keep answers SHORT — 1-2 sentences max\n- Be natural and conversational, like a real person\n- When they say goodbye or the conversation wraps up, say \"Thanks so much!\" and nothing else\n- Do NOT ask about price — wait for them to bring it up or text it",
        firstMessage: "Hi! I'm looking to get my house cleaned — do you guys do that?"
      }
    };
    const vp = voicePrompts[bizType];

    try {
      const res = await fetch(`${VAPI_BASE}/call`, {
        method:'POST', headers:{'Authorization':`Bearer ${VAPI_KEY}`,'Content-Type':'application/json'},
        body: JSON.stringify({
          phoneNumberId: FROM_VAPI_ID, customer: { number: vapiNumber },
          assistant: {
            model: { model:'gpt-4o-mini', provider:'openai', messages:[{role:'system', content: vp.system}]},
            voice:{model:'eleven_turbo_v2_5',voiceId:'pNInz6obpgDQGcFmaJgB',provider:'11labs'},
            firstMessage: vp.firstMessage,
            maxDurationSeconds:300, silenceTimeoutSeconds:30
          }
        })
      });
      const call = await res.json();
      if (!call.id) throw new Error(JSON.stringify(call));
      addSys('tVoice','Connected. Waiting for call to end...');

      let data, polls=0;
      while(polls<25){await sleep(12000);polls++;const r=await fetch(`${VAPI_BASE}/call/${call.id}`,{headers:{'Authorization':`Bearer ${VAPI_KEY}`}});data=await r.json();if(data.status==='ended')break;}
      if(!data||data.status!=='ended'){addSys('tVoice','Call timed out','sys-err');setBadge('badgeVoice','fail','TIMEOUT');return 'FAIL';}

      const dur=Math.round((new Date(data.endedAt)-new Date(data.startedAt))/1000);
      document.getElementById('mVoiceDur').textContent=dur+'s';
      addSys('tVoice',`Call ended (${data.endedReason}) - ${dur}s`);

      if(data.transcript){addPhase('tVoice','Transcript');data.transcript.split('\n').filter(l=>l.trim()).forEach(line=>{const isAI=line.startsWith('AI:');const isUser=line.startsWith('User:');if(isAI||isUser)addBubble('tVoice',line.replace(/^(AI|User):\s*/,''),isAI);});}
      if(data.recordingUrl){document.getElementById('audioRow').style.display='block';document.getElementById('audioPlayer').src=data.recordingUrl;}

      addPhase('tVoice','DB Verification');addSys('tVoice','Waiting 30s for webhooks...');await sleep(30000);
      // Check under both test phone (+14246771112, verbally given) and VAPI FROM number (+17169521258, caller ID)
      const cust1=await supaFetch('customers',`phone_number=eq.${TEST_PHONE_ENC}&select=id`);
      const cust2=await supaFetch('customers',`phone_number=eq.${FROM_VAPI_NUMBER_ENC}&select=id`);
      const cust=[...cust1,...cust2];
      const leads1=await supaFetch('leads',`phone_number=eq.${TEST_PHONE_ENC}&select=id`);
      const leads2=await supaFetch('leads',`phone_number=eq.${FROM_VAPI_NUMBER_ENC}&select=id`);
      const leads=[...leads1,...leads2];
      const dbCalls=await supaFetch('calls',`vapi_call_id=eq.${call.id}&select=id`);
      // Also check calls by phone number if not found by vapi_call_id
      const dbCalls2=dbCalls.length?[]:await supaFetch('calls',`phone_number=eq.${FROM_VAPI_NUMBER_ENC}&select=id&order=created_at.desc&limit=1`);
      const allCalls=[...dbCalls,...dbCalls2];
      const dbN=cust.length+leads.length+allCalls.length;
      document.getElementById('mVoiceDb').textContent=dbN;
      addSys('tVoice',`Customers: ${cust.length} (checked +14246771112 & +17169521258)`,cust.length>0?'sys-ok':'sys-warn');
      addSys('tVoice',`Leads: ${leads.length}, Calls: ${allCalls.length}`,leads.length+allCalls.length>0?'sys-ok':'sys-warn');

      // Check for post-call SMS (e.g. quote link texted after call)
      let postCallSms = false;
      if (biz.sms) {
        addPhase('tVoice','Post-Call SMS Check');
        addSys('tVoice','Checking for follow-up text message...');
        const smsNum = normalizePhone(biz.sms);
        const smsPhoneId = await resolveOpenPhoneId(smsNum);
        if (smsPhoneId) {
          // Check Cold Caller inbox for messages from the business number
          const callStartTime = data.startedAt;
          for (let poll = 0; poll < 4; poll++) {
            await sleep(10000);
            const mr = await fetch(`${OPENPHONE_BASE}/messages?phoneNumberId=PNuat0xvca&participants=${encodeURIComponent(smsNum)}&maxResults=5`,{headers:{'Authorization':OPENPHONE_KEY}});
            const md = await mr.json();
            const postMsgs = (md.data||[]).filter(m => m.direction === 'incoming' && m.createdAt > callStartTime);
            if (postMsgs.length > 0) {
              postCallSms = true;
              addPhase('tVoice','Post-Call Text');
              postMsgs.reverse().forEach(m => {
                addBubble('tVoice', m.text || m.content || '', false, new Date(m.createdAt).toLocaleTimeString('en-US',{hour12:false}));
              });
              break;
            }
          }
          if (!postCallSms) addSys('tVoice','No follow-up SMS received after call.','sys-warn');
        }
      }

      const tx = data.transcript || '';
      let checks;
      if (bizType === 'house_cleaning') {
        checks=[
          {t:'Call lasted >30s',s:dur>30},
          {t:'Transcript captured',s:!!tx},
          {t:'Bot asked about bed/bath',s:/bed|bath/i.test(tx)},
          {t:'Quote/price mentioned or texted',s:/quote|price|\$|text/i.test(tx)},
          {t:'Natural ending',s:['customer-ended-call','assistant-ended-call'].includes(data.endedReason)},
          {t:'Post-call SMS with quote received',s:postCallSms},
          {t:'Customer record created',s:cust.length>0},
          {t:'Lead created',s:leads.length>0},
          {t:'Call logged in DB',s:allCalls.length>0}
        ];
      } else {
        checks=[
          {t:'Call lasted >30s',s:dur>30},
          {t:'Transcript captured',s:!!tx},
          {t:'No price quoted',s:!/\$\d/.test(tx)},
          {t:'Natural ending',s:['customer-ended-call','assistant-ended-call'].includes(data.endedReason)},
          {t:'Customer record created',s:cust.length>0},
          {t:'Lead created',s:leads.length>0},
          {t:'Call logged in DB',s:allCalls.length>0}
        ];
      }
      showChecks('chkVoice',checks);
      const p=checks.filter(c=>c.s).length;
      const threshold = Math.ceil(checks.length * 0.7);
      setBadge('badgeVoice',p>=threshold?'pass':'fail',`${p}/${checks.length}`);
      return p>=threshold?'PASS':'FAIL';
    } catch(e){if(e.message==='__STOPPED__')throw e;addSys('tVoice','Error: '+e.message,'sys-err');setBadge('badgeVoice','fail','ERROR');return 'FAIL';}
  }

  // ── SMS Test ──
  async function testSms(biz) {
    if (!biz.sms) { setBadge('badgeSms','fail','SKIPPED'); addSys('tSms','No SMS number configured.','sys-warn'); return 'SKIPPED'; }
    const bizType = biz.type || 'window_cleaning';
    setBadge('badgeSms','running','TEXTING');
    const smsRouteEl = document.getElementById('smsRoute');
    smsRouteEl.textContent = `${TEST_PHONE} → ${normalizePhone(biz.sms)}`;
    smsRouteEl.style.display = 'block';
    addPhase('tSms','SMS Conversation');

    let replies, opener;
    if (bizType === 'house_cleaning') {
      opener = "Hi, I need a house cleaning";
      replies = [
        {match:/service|type|what.*clean|how.*help|standard|deep|move/i, reply:"Just a standard cleaning please"},
        {match:/bed|bath|room|how many/i, reply:"3 bedrooms and 2 bathrooms"},
        {match:/name|who.*am|call you|your name/i, reply:"Alex Thompson"},
        {match:/address|where|location|street/i, reply:"742 Evergreen Terrace, Naperville, IL 60540"},
        {match:/frequen|regular|weekly|bi.?week|month|one.?time|often/i, reply:"Just a one-time cleaning for now"},
        {match:/when|time|date|schedule|prefer|available/i, reply:"This Saturday at 10am would be great"},
        {match:/pet|animal|dog|cat/i, reply:"No pets"},
        {match:/email/i, reply:"alex.thompson.test@gmail.com"},
        {match:/how.*find|hear|refer|found/i, reply:"Google search"},
        {match:/anything.*else|special.*request|note|extra/i, reply:"Nope, that's everything!"},
      ];
    } else {
      opener = "Hi, I'm interested in getting my windows cleaned";
      replies = [
        {match:/service|type|what.*clean|how.*help/i, reply:"Window cleaning please"},
        {match:/interior|exterior|inside|outside|both/i, reply:"Just exterior"},
        {match:/sq.*ft|square.*f|size|how big/i, reply:"About 2500 square feet"},
        {match:/french|pane|mullion/i, reply:"No, no French panes"},
        {match:/name|who.*am|call you|your name/i, reply:"Alex Thompson"},
        {match:/address|where|location|street/i, reply:"742 Evergreen Terrace, Naperville, IL 60540"},
        {match:/when|time|date|schedule|saturday|available|prefer/i, reply:"This Saturday at 10am would be great"},
        {match:/how.*find|hear|refer|found/i, reply:"Google search"},
      ];
    }

    let msgCount=0, used=new Set(), booked=false, botResponded=false, quoteLinkReceived=false, bedBathAsked=false, sqftAsked=false;
    try {
      // Normalize + resolve the OpenPhone phone number ID for the business's SMS number
      const smsNumber = normalizePhone(biz.sms);
      const bizPhoneId = await resolveOpenPhoneId(smsNumber);
      if (!bizPhoneId) { addSys('tSms','Could not resolve OpenPhone ID for '+smsNumber,'sys-err'); setBadge('badgeSms','fail','ERROR'); return 'FAIL'; }
      addSys('tSms',`Resolved ${smsNumber} -> ${bizPhoneId}`);

      // Record start time to filter out old messages
      const testStartTime = new Date().toISOString();

      await fetch(`${OPENPHONE_BASE}/messages`,{method:'POST',headers:{'Authorization':OPENPHONE_KEY,'Content-Type':'application/json'},body:JSON.stringify({from:FROM_OPENPHONE_ID,to:[smsNumber],content:opener})});
      addBubble('tSms',opener,true,ts());msgCount++;

      let lastId=null,noReply=0;
      for(let round=0;round<20;round++){
        await sleep(15000);
        const mRes=await fetch(`${OPENPHONE_BASE}/messages?phoneNumberId=${bizPhoneId}&participants=${TEST_PHONE_ENC}&maxResults=15`,{headers:{'Authorization':OPENPHONE_KEY}});
        const mData=await mRes.json();
        // Filter: only incoming messages created AFTER our test started
        // On business phone: outgoing = bot replies TO customer, incoming = customer messages
        const inbound=(mData.data||[]).filter(m=>m.direction==='outgoing' && m.createdAt > testStartTime);
        if(!inbound.length||(lastId&&inbound[0].id===lastId)){noReply++;if(noReply>=8){addSys('tSms','No reply after 2 minutes.','sys-err');break;}continue;}
        noReply=0;botResponded=true;const msg=inbound[0];lastId=msg.id;
        const body=msg.text||msg.content||'';
        addBubble('tSms',body,false,new Date(msg.createdAt).toLocaleTimeString('en-US',{hour12:false}));msgCount++;

        // Track what bot asked about
        if(/bed|bath/i.test(body)) bedBathAsked = true;
        if(/sq.*ft|square.*f/i.test(body)) sqftAsked = true;

        // Bug / success detection based on business type
        if (bizType === 'house_cleaning') {
          if(/\/quote\/|cleanmachine|https?:\/\//i.test(body)){quoteLinkReceived=true;addSys('tSms','Quote link sent successfully!','sys-ok');booked=true;break;}
          if(/sq.*ft|square.*f/i.test(body))addSys('tSms','BUG: Bot asked for square footage (cleaning uses bed/bath)','sys-err');
          if(/email/i.test(body))addSys('tSms','Note: Bot asked for email','sys-warn');
        } else {
          if(/email/i.test(body))addSys('tSms','BUG: Bot asked for email','sys-err');
          if(/quote.*link|payment.*link|stripe|checkout/i.test(body))addSys('tSms','BUG: Quote/payment link sent','sys-err');
        }

        // Check for traditional booking confirmation (window cleaning)
        if(bizType === 'window_cleaning' && /confirm|booked|all set|see you|appointment.*set/i.test(body)){booked=true;addSys('tSms','Booking confirmed!','sys-ok');break;}

        let replied=false;
        for(let i=0;i<replies.length;i++){if(!used.has(i)&&replies[i].match.test(body)){await sleep(2000);await fetch(`${OPENPHONE_BASE}/messages`,{method:'POST',headers:{'Authorization':OPENPHONE_KEY,'Content-Type':'application/json'},body:JSON.stringify({from:FROM_OPENPHONE_ID,to:[smsNumber],content:replies[i].reply})});addBubble('tSms',replies[i].reply,true,ts());msgCount++;used.add(i);replied=true;break;}}
      }
      document.getElementById('mSmsMsgs').textContent=msgCount;
      addPhase('tSms','DB Verification');await sleep(5000);
      const cust=await supaFetch('customers',`phone_number=eq.${TEST_PHONE_ENC}&select=id`);
      const leads=await supaFetch('leads',`phone_number=eq.${TEST_PHONE_ENC}&select=id`);
      document.getElementById('mSmsDb').textContent=cust.length+leads.length;
      addSys('tSms',`Customers: ${cust.length}, Leads: ${leads.length}`,cust.length?'sys-ok':'sys-warn');

      let checks;
      if (bizType === 'house_cleaning') {
        checks=[
          {t:'Bot responded',s:botResponded},
          {t:'Bot asked about bed/bath count',s:bedBathAsked},
          {t:'Quote link received',s:quoteLinkReceived},
          {t:'Bot did NOT ask for square footage',s:!sqftAsked},
          {t:'Customer record created',s:cust.length>0},
          {t:'Lead created',s:leads.length>0},
        ];
      } else {
        checks=[
          {t:'Bot responded',s:botResponded},
          {t:'Booking completed',s:booked},
          {t:'Customer record created',s:cust.length>0},
          {t:'Lead created',s:leads.length>0},
        ];
      }
      showChecks('chkSms',checks);
      const p=checks.filter(c=>c.s).length;
      const threshold = Math.ceil(checks.length * 0.7);
      setBadge('badgeSms',p>=threshold?'pass':'fail',`${p}/${checks.length}`);
      return p>=threshold?'PASS':'FAIL';
    }catch(e){if(e.message==='__STOPPED__')throw e;addSys('tSms','Error: '+e.message,'sys-err');setBadge('badgeSms','fail','ERROR');return 'FAIL';}
  }

  // ── Website Form Test ──
  async function testWebForm(biz) {
    if (!biz.web) { setBadge('badgeWeb','fail','SKIPPED'); addSys('tWeb','No website URL configured.','sys-warn'); return 'SKIPPED'; }
    setBadge('badgeWeb','running','TESTING');addPhase('tWeb','Website Form Submission');
    try {
      const bizType = biz.type || 'window_cleaning';
      // Build the correct form endpoint URL
      let formUrl = biz.web.replace(/\/+$/, '');
      // If user gave the homepage, append the API endpoint
      if (!/\/api\//.test(formUrl)) {
        const slug = biz.name.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/-+$/,'');
        formUrl += `/api/webhooks/website/${slug}`;
      }
      addSys('tWeb','Submitting form to '+formUrl);
      // Use correct field names matching the actual form (service_type, not service)
      const formData = bizType === 'house_cleaning' ? {
        name:'Alex Thompson',phone:'4246771112',email:'alex.thompson.test@gmail.com',
        address:'742 Evergreen Terrace, Naperville, IL 60540',
        service_type:'Standard cleaning',
        message:'Looking for a standard cleaning for my 3 bed 2 bath home. One-time cleaning.',
        source:'Google search'
      } : {
        name:'Alex Thompson',phone:'4246771112',email:'alex.thompson.test@gmail.com',
        address:'742 Evergreen Terrace, Naperville, IL 60540',
        service_type:'Exterior window cleaning',
        message:'Interested in exterior window cleaning for my 2500 sqft home. No French panes. Preferred time: Saturday at 10am.',
        source:'Google search'
      };
      Object.entries(formData).forEach(([k,v])=>addSys('tWeb',`  ${k}: ${v}`));
      addSys('tWeb','Sending via server-side proxy to avoid CORS...');
      const proxyRes=await fetch('/api/proxy-form',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({targetUrl:formUrl, formData})
      });
      const proxyData=await proxyRes.json();
      const status=proxyData.status;
      document.getElementById('mWebStatus').textContent=status||'ERR';
      addSys('tWeb',`Response: HTTP ${status} ${proxyData.statusText||''}`,status&&status<300?'sys-ok':'sys-err');
      if(proxyData.body)addSys('tWeb','Body: '+proxyData.body.slice(0,200));
      await sleep(10000);
      const cust=await supaFetch('customers',`phone_number=eq.${TEST_PHONE_ENC}&select=id`);
      const leads=await supaFetch('leads',`phone_number=eq.${TEST_PHONE_ENC}&select=id`);
      document.getElementById('mWebDb').textContent=cust.length+leads.length;
      const checks=[{t:'Form submitted successfully',s:status>=200&&status<300},{t:'Customer record created',s:cust.length>0},{t:'Lead created',s:leads.length>0}];
      showChecks('chkWeb',checks);
      const p=checks.filter(c=>c.s).length;
      setBadge('badgeWeb',p>=2?'pass':'fail',`${p}/${checks.length}`);
      return p>=2?'PASS':'FAIL';
    }catch(e){
      if(e.message==='__STOPPED__')throw e;
      addSys('tWeb','Error: '+e.message,'sys-err');
      document.getElementById('mWebStatus').textContent='ERR';
      setBadge('badgeWeb','fail','ERROR');return 'FAIL';
    }
  }

  // ── Email Test ──
  async function testEmail(biz) {
    if (!biz.email) { setBadge('badgeEmail','fail','SKIPPED'); addSys('tEmail','No email configured.','sys-warn'); return 'SKIPPED'; }
    setBadge('badgeEmail','running','TESTING');addPhase('tEmail','Email Test');
    addSys('tEmail',`Sending test email to ${biz.email}...`);
    try {
      const emailBody = `<p>Hi, I'm interested in getting a cleaning quote.</p>
<p><strong>Name:</strong> Alex Thompson<br>
<strong>Phone:</strong> (424) 677-1112<br>
<strong>Address:</strong> 742 Evergreen Terrace, Naperville, IL 60540<br>
<strong>Service:</strong> ${(biz.type||'window_cleaning')==='house_cleaning'?'Standard house cleaning (3 bed / 2 bath)':'Exterior window cleaning (2500 sqft)'}<br>
<strong>Preferred time:</strong> Saturday at 10am</p>
<p>Found you through Google search. Thanks!</p>`;

      const res = await fetch('/api/proxy-email', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          to: biz.email,
          subject: 'Cleaning Inquiry - Alex Thompson',
          body: emailBody
        })
      });
      const data = await res.json();

      if (data.sent) {
        document.getElementById('mEmailStatus').textContent = 'Sent';
        addSys('tEmail', `Email sent via ${data.provider}`, 'sys-ok');
        if (data.response) addSys('tEmail', 'Response: ' + JSON.stringify(data.response).slice(0,200));
        setBadge('badgeEmail', 'pass', 'SENT');
        return 'PASS';
      } else {
        document.getElementById('mEmailStatus').textContent = 'N/A';
        addSys('tEmail', data.error || 'Email not sent', 'sys-warn');
        addSys('tEmail', 'To enable: set GMAIL_USER and GMAIL_APP_PASSWORD env vars on Vercel.', 'sys-warn');
        setBadge('badgeEmail', 'fail', 'NO PROVIDER');
        return 'SKIPPED';
      }
    } catch(e) {
      if(e.message==='__STOPPED__')throw e;
      addSys('tEmail','Error: '+e.message,'sys-err');
      document.getElementById('mEmailStatus').textContent='ERR';
      setBadge('badgeEmail','fail','ERROR');
      return 'FAIL';
    }
  }

  // ── Run All Tests on Checked Businesses ──
  function finishRun() {
    running = false;
    stopRequested = false;
    const btn = document.getElementById('runAllBtn');
    btn.disabled = false;
    btn.innerHTML = 'Run All Tests';
    document.getElementById('stopBtn').style.display = 'none';
    document.getElementById('testingLabel').style.display = 'none';
    renderBizList();
  }

  async function runAllTests() {
    const checked = getCheckedBiz();
    if (running || checked.length === 0) return;
    running = true;
    stopRequested = false;
    const btn = document.getElementById('runAllBtn');
    btn.disabled = true;
    btn.innerHTML = '<span class="spinner-sm"></span> Running Tests...';
    document.getElementById('stopBtn').style.display = 'inline-block';
    document.getElementById('testGrid').style.display = 'grid';

    const testLabel = document.getElementById('testingLabel');
    testLabel.style.display = 'block';

    const allResults = [];

    try {
      for (let bi = 0; bi < checked.length; bi++) {
        if (stopRequested) break;
        const biz = checked[bi];
        const typeLabel = (biz.type || 'window_cleaning') === 'house_cleaning' ? 'Cleaning Company' : 'Window Cleaning';
        document.getElementById('testingBizName').textContent = `${biz.name} (${typeLabel})`;
        document.getElementById('testingProgress').textContent = `(${bi + 1}/${checked.length})`;

        resetPanels();
        setStatus(`Testing "${biz.name}" (${bi + 1}/${checked.length})...`);

        await resetTestData();
        if (stopRequested) break;
        setStatus(`[${biz.name}] Test 1/4: Voice call...`);
        const voice = await testVoice(biz);

        if (stopRequested) break;
        await resetTestData();
        setStatus(`[${biz.name}] Test 2/4: SMS...`);
        const sms = await testSms(biz);

        if (stopRequested) break;
        await resetTestData();
        setStatus(`[${biz.name}] Test 3/4: Website form...`);
        const web = await testWebForm(biz);

        if (stopRequested) break;
        setStatus(`[${biz.name}] Test 4/4: Email...`);
        const email = await testEmail(biz);

        allResults.push({ name: biz.name, voice, sms, web, email });
      }
    } catch (e) {
      if (e.message === '__STOPPED__') {
        setStatus('Tests stopped.');
        finishRun();
        return;
      }
      throw e;
    }

    if (stopRequested) {
      setStatus('Tests stopped.');
      finishRun();
      return;
    }

    // Send notification
    const summary = allResults.map(r => `${r.name}: Voice=${r.voice}, SMS=${r.sms}, Web=${r.web}, Email=${r.email}`).join(' | ');
    setStatus('All tests complete. Sending notification...');
    await sendNotification(`Osiris E2E tests done. ${summary}`);
    setStatus('All tests complete. Notification sent to +1 (415) 720-4580.');

    finishRun();
  }

  // ── Init ──
  loadBusinesses();
</script>
